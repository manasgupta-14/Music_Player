<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify: My Fav Song</title>
  <link rel="stylesheet" href="Css/Spotifystyle.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ubuntu&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap">
  <script src="https://kit.fontawesome.com/695e0291e6.js" crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</head>
<body>
  <nav>
    <ul>
      <li class="brand"><img src="logo.png" alt="Logo"> Spotify </li>
      <li>Home</li>
      <li>About</li>
    </ul>
  </nav>

  <div class="container1">
    <div class="songlist">
      <h1>New Song : Mood Refreshing Song</h1>

      <div class="songItemContainer mt-5">
        <div class="songItem">
          <img src="covers/new1.jpg" alt="1">
          <span class="songName">Heeriye</span>
          <span class="songlistplay"><span class="timestamp">03:19 <i class="fa fa-play-circle songItemPlay" id="0"></i> </span></span>
        </div>

        <div class="songItem">
          <img src="covers/new2.jpg" alt="2">
          <span class="songName">Kabhi Shaam Dhale</span>
          <span class="songlistplay"><span class="timestamp">04:07 <i class="fa fa-play-circle songItemPlay" id="1"></i> </span></span>
        </div>

        <div class="songItem">
          <img src="covers/new3.jpg" alt="3">
          <span class="songName">O Mahi O Mahi</span>
          <span class="songlistplay"><span class="timestamp">03:53 <i class="fa fa-play-circle songItemPlay" id="2"></i> </span></span>
        </div>

        <div class="songItem">
          <img src="covers/new4.jpg" alt="1">
          <span class="songName" >O Sajni Re</span>
          <span class="songlistplay"><span class="timestamp">02:50 <i class="fa fa-play-circle songItemPlay" id="3"></i> </span></span>
        </div>

        <div class="songItem">
          <img src="covers/new5.jpg" alt="1">
          <span class="songName" >Pehle Bhi Main</span>
          <span class="songlistplay"><span class="timestamp">04:10 <i class="fa fa-play-circle songItemPlay" id="4"></i> </span></span>
        </div>

        <div class="songItem">
          <img src="covers/new6.jpg" alt="1">
          <span class="songName" >Sanam Re</span>
          <span class="songlistplay"><span class="timestamp">04:29 <i class="fa fa-play-circle songItemPlay" id="5"></i> </span></span>
        </div>

        <div class="songItem">
          <img src="covers/new7.jpg" alt="1">
          <span class="songName" >Soni Soni</span>
          <span class="songlistplay"><span class="timestamp">03:13 <i class="fa fa-play-circle songItemPlay" id="6"></i> </span></span>
        </div>

        <div class="songItem">
          <img src="covers/new8.jpg" alt="1">
          <span class="songName" >Soulmate</span>
          <span class="songlistplay"><span class="timestamp">03:33 <i class="fa fa-play-circle songItemPlay" id="7"></i> </span></span>
        </div>

        <div class="songItem">
          <img src="covers/9.jpg" alt="1">
          <span class="songName" >Tu Hai Kahan</span>
          <span class="songlistplay"><span class="timestamp">04:23 <i class="fa fa-play-circle songItemPlay" id="8"></i> </span></span>
        </div>

        <div class="songItem">
          <img src="covers/new10.jpg" alt="1">
          <span class="songName" >Mann Meri Jaan</span>
          <span class="songlistplay"><span class="timestamp">03:14 <i class="fa fa-play-circle songItemPlay" id="9"></i> </span></span>
        </div>
      </div>
    </div>

    <div class="songBanner"></div>
  </div>

  <div class="bottom">
    <input type="range" name="range" id="myProgressBar" value="0" min="0" max="100">

    <div class="icons">
      <i class="fa fa-step-backward" id="previous" style="font-size:60px"></i>
      <i class="fa fa-play-circle" id="masterPlay" style="font-size:60px"></i>
      <i class="fa fa-step-forward" id="next" style="font-size:60px"></i>
    </div>

    <div class="songInfo">
      <img src="playing.gif" width="42px" alt="" id="gif"><span id="masterSongName">Heeriye</span>
    </div>
    <div class="playtime">
      <span id="playDuration">0:00</span>
    </div>
  </div> 

  

  <script src="Js/SpotifyJs2.js"></script>
</body>
</html>
